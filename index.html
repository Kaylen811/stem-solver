<!DOCTYPE html>
<html>
<head>
  <title>STEM Solver</title>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
   <style> 
     body {
            font-family: Arial;
            text-align: center;
        }

        button {
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 10px 15px;
            margin: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        } 
     .box {
    background: white;
    padding: 20px;
    margin-top: 40px;
    border-radius: 10px;
    width: 60%;
    margin-left: auto;
    margin-right: auto;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
}
</head>
<body> 
     <div class="box">
    <!-- all your content here -->
</div>

<h1>STEM Solver</h1>

<input id="problem" placeholder="Type: x^2 + 3*x">
<button onclick="solve()">Solve</button>
  <button onclick="solve('simplify')">Simplify</button>
<button onclick="solve('expand')">Expand</button>

<p id="answer"></p>

<script>
async function solve() {
  const problem = document.getElementById("problem").value;

  const response = await fetch("http://127.0.0.1:5000/solve", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ problem })
  });

  const data = await response.json();

document.getElementById("result").innerHTML = "$$" + data.result + "$$";
MathJax.typeset();
}
</script>

</body>
</html>
